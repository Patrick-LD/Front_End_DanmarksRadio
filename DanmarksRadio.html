<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danmarks Radio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>

<body class="bg-light">
    <nav class="navbar navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="#">Danmarks Radio</a>
        </div>
    </nav>
    <div id="app" class="container py-4">
        <h1 class="mb-4 text-primary">Danmarks Radio</h1>
        <input type="number" v-model="searchId" placeholder="Id">
        <button @click="GetById(searchId)">Find</button>
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>Id</th>
                    <th>Title</th>
                    <th>Artist</th>
                    <th>Duration</th>
                    <th>Published Year</th>
                    <th>Handlinger</th>
                </tr>
            </thead>
            <tbody>
                <tr v-for="item in items" :key="item.id">
                    <td>{{ item.id }}</td>
                    <td><input class="form-control" v-model="item.title"></td>
                    <td><input class="form-control" v-model="item.artist"></td>
                    <td><input class="form-control" type="number" v-model="item.duration"></td>
                    <td><input class="form-control" type="number" v-model="item.publishedYear"></td>
                    <td>
                        <button class="btn btn-success btn-sm me-1" @click="opdater(item)">Opdater</button>
                        <button class="btn btn-danger btn-sm" @click="slet(item.id)">Slet</button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <script src="DanmarksRadio.js"></script>
</body>

</html>
